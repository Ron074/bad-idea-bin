<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>HTML + CSS</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playwrite+DE+Grund:wght@100..400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Bad Idea?! Let Us Know About It!</h1>

    <form id="ideaForm" action="Blog.html" target="_blank" method="get">
      <label for="post-title">Post Title:</label><br />
      <input type="text" id="post-title" name="title" /><br />

      <label for="post-content">Post Content:</label><br />
      <textarea
        id="post-content"
        name="content"
        placeholder="Type your worst idea here..."
        rows="5"
        cols="100"
      ></textarea
      ><br />

      <button type="submit" id="addIdeaBtn">Submit to the Bin!</button>
    </form>

    <script src="script.js"></script>
  </body>
</html>
